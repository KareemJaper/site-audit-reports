<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX/UI Audit Reports — Kareem Gaber</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: #1A1A2E; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 600px; width: 100%; padding: 40px 24px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  p.subtitle { color: #64748B; margin-bottom: 32px; }
  .report-list { list-style: none; }
  .report-list a {
    display: block; padding: 20px 24px; background: white; border-radius: 12px;
    margin-bottom: 12px; text-decoration: none; color: #1A1A2E;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #E2E8F0;
    transition: all 0.2s;
  }
  .report-list a:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .report-list .name { font-weight: 600; font-size: 16px; }
  .report-list .meta { color: #64748B; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>UX/UI Audit Reports</h1>
  <p class="subtitle">By Kareem Gaber</p>
  <ul class="report-list">
    <li>
      <a href="miska/">
        <div class="name">Miska Store — miskaeg.com</div>
        <div class="meta">Perfumes & Body Care | April 2026</div>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
